<p><strong>Solution:</strong></p>
<p>The number of games played by a team is <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><mrow><mn>3</mn><mi>N</mi><mo>+</mo><mn>4</mn><mi>M</mi><mo>=</mo><mn>76</mn></mrow>3 N+4 M=76</math></span><span aria-hidden="true" class="katex-html"><span class="base"><span style="height:0.76666em;vertical-align:-0.08333em;" class="strut"></span><span class="mord">3</span><span style="margin-right:0.10903em;" class="mord mathnormal">N</span><span style="margin-right:0.2222222222222222em;" class="mspace"></span><span class="mbin">+</span><span style="margin-right:0.2222222222222222em;" class="mspace"></span></span><span class="base"><span style="height:0.68333em;vertical-align:0em;" class="strut"></span><span class="mord">4</span><span style="margin-right:0.10903em;" class="mord mathnormal">M</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span><span class="mrel">=</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span></span><span class="base"><span style="height:0.64444em;vertical-align:0em;" class="strut"></span><span class="mord">7</span><span class="mord">6</span></span></span></span>. Because <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><mrow><mi>M</mi><mo>&gt;</mo><mn>4</mn></mrow>M&gt;4</math></span><span aria-hidden="true" class="katex-html"><span class="base"><span style="height:0.72243em;vertical-align:-0.0391em;" class="strut"></span><span style="margin-right:0.10903em;" class="mord mathnormal">M</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span><span class="mrel">&gt;</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span></span><span class="base"><span style="height:0.64444em;vertical-align:0em;" class="strut"></span><span class="mord">4</span></span></span></span> and <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><mrow><mi>N</mi><mo>&gt;</mo><mn>2</mn><mi>M</mi></mrow>N&gt;2 M</math></span><span aria-hidden="true" class="katex-html"><span class="base"><span style="height:0.72243em;vertical-align:-0.0391em;" class="strut"></span><span style="margin-right:0.10903em;" class="mord mathnormal">N</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span><span class="mrel">&gt;</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span></span><span class="base"><span style="height:0.68333em;vertical-align:0em;" class="strut"></span><span class="mord">2</span><span style="margin-right:0.10903em;" class="mord mathnormal">M</span></span></span></span> it follows that <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><mrow><mi>N</mi><mo>&gt;</mo><mn>8</mn></mrow>N&gt;8</math></span><span aria-hidden="true" class="katex-html"><span class="base"><span style="height:0.72243em;vertical-align:-0.0391em;" class="strut"></span><span style="margin-right:0.10903em;" class="mord mathnormal">N</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span><span class="mrel">&gt;</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span></span><span class="base"><span style="height:0.64444em;vertical-align:0em;" class="strut"></span><span class="mord">8</span></span></span></span>. Because <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><mrow><mn>4</mn></mrow>4</math></span><span aria-hidden="true" class="katex-html"><span class="base"><span style="height:0.64444em;vertical-align:0em;" class="strut"></span><span class="mord">4</span></span></span></span> divides both <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><mrow><mn>76</mn></mrow>76</math></span><span aria-hidden="true" class="katex-html"><span class="base"><span style="height:0.64444em;vertical-align:0em;" class="strut"></span><span cla "><span style="height:0.64444em;vertical-align:0em;" class="strut"></span><span class="mord">1</span><span class="mord">2</span></span></span></span> then <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><mrow><mi>M</mi><mo>=</mo><mn>10</mn></mrow>M=10</math></span><span aria-hidden="true" class="katex-html"><span class="base"><span style="height:0.68333em;vertical-align:0em;" class="strut"></span><span style="margin-right:0.10903em;" class="mord mathnormal">M</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span><span class="mrel">=</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span></span><span class="base"><span style="height:0.64444em;vertical-align:0em;" class="strut"></span><span class="mord">1</span><span class="mord">0</span></span></span></span> and the condition <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><mrow><mi>N</mi><mo>&gt;</mo><mn>2</mn><mi>M</mi></mrow>N&gt;2 M</math></span><span aria-hidden="true" class="katex-html"><span class="base"><span style="height:0.72243em;vertical-align:-0.0391em;" class="strut"></span><span style="margin-right:0.10903em;" class="mord mathnormal">N</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span><span class="mrel">&gt;</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span></span><span class="base"><span style="height:0.68333em;vertical-align:0em;" class="strut"></span><span class="mord">2</span><span style="margin-right:0.10903em;" class="mord mathnormal">M</span></span></span></span> is not satisfied. If <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><mrow><mi>N</mi><mo>≥</mo><mn>20</mn></mrow>N \geq 20</math></span><span aria-hidden="true" class="katex-html"><span class="base"><span style="height:0.8193em;vertical-align:-0.13597em;" class="strut"></span><span style="margin-right:0.10903em;" class="mord mathnormal">N</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span><span class="mrel">≥</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span></span><span class="base"><span style="height:0.64444em;vertical-align:0em;" class="strut"></span><span class="mord">2</span><span class="mord">0</span></span></span></span> then <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><mrow><mi>M</mi><mo>≤</mo><mn>4</mn></mrow>M \leq 4</math></span><span aria-hidden="true" class="katex-html"><span class="base"><span style="height:0.8193em;vertical-align:-0.13597em;" class="strut"></span><span style="margin-right:0.10903em;" class="mord mathnormal">M</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span><span class="mrel">≤</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span></span><span class="base"><span style="height:0.64444em;vertical-align:0em;" class="strut"></span><span class="mord">4</span></span></span></span> and the condition <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><mrow><mi>M</mi><mo>&gt;</mo><mn>4</mn></mrow>M&gt;4</math></span><span aria-hidden="true" class="katex-html"><span class="base"><span style="height:0.72243em;vertical-align:-0.0391em;" class="strut"></span><span style="margin-right:0.10903em;" class="mord mathnormal">M</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span><span class="mrel">&gt;</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span></span><span class="base"><span style="height:0.64444em;vertical-align:0em;" class="strut"></span><span class="mord">4</span></span></span></span> is not satisfied. So the only possibility is <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><mrow><mi>N</mi><mo>=</mo><mn>16</mn></mrow>N=16</math></span><span aria-hidden="true" class="katex-html"><span class="base"><span style="height:0.68333em;vertical-align:0em;" class="strut"></span><span style="margin-right:0.10903em;" class="mord mathnormal">N</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span><span class="mrel">=</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span></span><span class="base"><span style="height:0.64444em;vertical-align:0em;" class="strut"></span><span class="mord">1</span><span class="mord">6</span></span></span></span> and <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><mrow><mi>M</mi><mo>=</mo><mn>7</mn></mrow>M=7</math></span><span aria-hidden="true" class="katex-html"><span class="base"><span style="height:0.68333em;vertical-align:0em;" class="strut"></span><span style="margin-right:0.10903em;" class="mord mathnormal">M</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span><span class="mrel">=</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span></span><span class="base"><span style="height:0.64444em;vertical-align:0em;" class="strut"></span><span class="mord">7</span></span></span></span>. So each team plays <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><mrow><mn>3</mn><mo>⋅</mo><mn>16</mn><mo>=</mo><mn>48</mn></mrow>3 \cdot 16=48</math></span><span aria-hidden="true" class="katex-html"><span class="base"><span style="height:0.64444em;vertical-align:0em;" class="strut"></span><span class="mord">3</span><span style="margin-right:0.2222222222222222em;" class="mspace"></span><span class="mbin">⋅</span><span style="margin-right:0.2222222222222222em;" class="mspace"></span></span><span class="base"><span style="height:0.64444em;vertical-align:0em;" class="strut"></span><span class="mord">1</span><span class="mord">6</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span><span class="mrel">=</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span></span><span class="base"><span style="height:0.64444em;vertical-align:0em;" class="strut"></span><span class="mord">4</span><span class="mord">8</span></span></span></span> games within its division and <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><mrow><mn>4</mn><mo>⋅</mo><mn>7</mn><mo>=</mo><mn>28</mn></mrow>4 \cdot 7=28</math></span><span aria-hidden="true" class="katex-html"><span class="base"><span style="height:0.64444em;vertical-align:0em;" class="strut"></span><span class="mord">4</span><span style="margin-right:0.2222222222222222em;" class="mspace"></span><span class="mbin">⋅</span><span style="margin-right:0.2222222222222222em;" class="mspace"></span></span><span class="base"><span style="height:0.64444em;vertical-align:0em;" class="strut"></span><span class="mord">7</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span><span class="mrel">=</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span></span><span class="base"><span style="height:0.64444em;vertical-align:0em;" class="strut"></span><span class="mord">2</span><span class="mord">8</span></span></span></span> games against the other division.</p>

</math></span><span aria-hidden="true" class="katex-html"><span class="base"><span style="height:0.68611em;vertical-align:0em;" class="strut"></span><span class="mord text"><span class="mord textbf">OR</span></span></span></span></span></span></p><p>The total number of games played by each team is <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><mrow><mn>3</mn><mi>N</mi><mo>+</mo><mn>4</mn><mi>M</mi><mo>=</mo><mn>76</mn></mrow>3 N+4 M=76</math></span><span aria-hidden="true" class="katex-html"><span class="base"><span style="height:0.76666em;vertical-align:-0.08333em;" class="strut"></span><span class="mord">3</span><span style="margin-right:0.10903em;" class="mord mathnormal">N</span><span style="margin-right:0.2222222222222222em;" class="mspace"></span><span class="mbin">+</span><span style="margin-right:0.2222222222222222em;" class="mspace"></span></span><span class="base"><span style="height:0.68333em;vertical-align:0em;" class="strut"></span><span class="mord">4</span><span style="margin-right:0.10903em;" class="mord mathnormal">M</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span><span class="mrel">=</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span></span><span class="base"><span style="height:0.64444em;vertical-align:0em;" class="strut"></span><span class="mord">7</span><span class="mord">6</span></span></span></span>. Make a chart of possibilities with <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><mrow><mi>M</mi><mo>&gt;</mo><mn>4</mn></mrow>M&gt;4</math></span><span aria-hidden="true" class="katex-html"><span class="base"><span style="height:0.72243em;vertical-align:-0.0391em;" class="strut"></span><span style="margin-right:0.10903em;" class="mord mathnormal">M</span><span style="margin-right:0.2777777777777778em;" class="mspace"></span><span class="mrel">&gt;</span><span style="margin-right:0.2777777777777
