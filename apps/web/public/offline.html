<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Adaptive Math Learning Offline</title>
    <style>
      :root {
        color: #17324d;
        background: #fffdf8;
        font-family: Arial, Helvetica, sans-serif;
      }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 24px;
        background: linear-gradient(180deg, #e3f3ef, #fffdf8 340px);
      }
      main {
        width: min(560px, 100%);
        border: 1px solid #d9e3ea;
        border-radius: 8px;
        padding: 24px;
        background: #fff;
        box-shadow: 0 14px 35px rgba(23, 50, 77, 0.08);
      }
      h1 {
        margin: 0 0 10px;
        color: #0b4269;
        font-family: Georgia, "Times New Roman", serif;
      }
      p {
        margin: 0;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline</h1>
      <p>The learning app is installed, but this page is not cached yet. Reconnect once, open Practice, Diagnostic, or Dashboard, and they will be available faster next time.</p>
    </main>
  </body>
</html>
